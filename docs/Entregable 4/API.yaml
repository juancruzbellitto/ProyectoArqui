openapi: 3.0.3
info:
  title: API specification                              # Nombre visible en swagger UI
  version: 1.0.0                                        # Versión del contrato, no del sistema

servers:
  - url:  https://proyectoayds.vercel.app/api/v1        # URL base

paths:

  # --------- MÓDULO: USUARIOS -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

  /usuarios:                                            # Endpoint para sincronizar un nuevo usuario o registrar el perfil local del usuario una vez se autentica con Clerk
    post:
      summary: Sincronizar un nuevo usuario (Webhook de Clerk o registro inicial)
      tags: [Usuarios]
      security: []
      description: Endpoint utilizado para registrar el perfil local del usuario una vez se autentica con Clerk.
                   Al operar como webhook, la autenticación no utiliza Bearer Token, sino que verifica mediante la firma
                   de la petición.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, nombre, telefono, clerkUserId]
              properties:
                email:
                  type: string
                  format: email
                  example: "usuario@email.com"
                nombre:
                  type: string
                  example: "Juan Perez"
                telefono:
                  type: string
                  example: "2914567890"
                clerkUserId:
                  type: string 
                  description: ID único provisto por Clerk para asociar las cuentas
                  example: "user_2F9x..."
      responses:
        '201':
          description: Perfil de usuario creado con éxito
          headers:
            Location:
              description: URI para consultar el perfil del usuario creado
              schema:
                type: string
              example: "/usuarios/usuario@mail.com"
        '400':
          description: Datos inválidos o faltantes en la Solicitud
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: El email o el clerkUserId ya se encuentran registrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usuarios/{email}:                                    # Endpoints para consultar o modificar datos del perfil de un usuario específico
    get:                                                # Endpoint para consultar datos del perfil de un usuario específico
      summary: Consultar datos del perfil del usuario
      tags: [Usuarios]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
            format: email
          example: "usuario@mail.com"
      responses:
        '200':
          description: Datos del usuario obtenidos exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    format: email
                    example: "usuario@mail.com"
                  nombre:
                    type: string
                    example: "Juan Perez"
                  telefono:
                    type: string
                    example: "2914567890"
                  rol:
                    type: string
                    example: "CLIENTE"
                  clerkUserId:
                    type: string
                    example: "user_2F9x"
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tienes permisos para ver los datos de otro usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:                                              # Endpoint para modificar datos de contacto del perfil de un usuario específico
      summary: Modificar datos de contacto del perfil
      tags: [Usuarios]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
            format: email
          example: "usuario@mail.com"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  example: "Juan Pérez"
                telefono:
                  type: string
                  example: "2914567890"
      responses:
        '200':
          description: Datos modificados exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    format: email
                    example: "usuario@mail.com"
                  nombre:
                    type: string
                    example: "Juan Pérez"
                  telefono:
                    type: string
                    example: "2914567890"
        '400':
          description: Atributos provistos con formatos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token inválido o no provisto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Acción denegada sobre perfiles ajenos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: El usuario solicitado no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


  # --------- MÓDULO: RESERVAS ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

  /reservas:                                            # Endpoints para listar o crear reservas
    get:                                                #✅ Endpoint para listar reservas con filtros opcionales por emailCliente, idCancha o fecha
      summary: Listar reservas
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: emailCliente
          required: false
          schema:
            type: string
            format: email
            example: "usuario@mail.com"
        - in: query
          name: idCancha
          required: false
          schema:
            type: integer
            example: 1
        - in: query
          name: fecha
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-06-08T00:00:00Z"
      responses:
        '200':
          description: Lista de reservas obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reserva'
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:                                               #✅ Endpoint para crear una nueva reserva                     
      summary: Crear una nueva reserva
      tags: [Reservas]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fecha, hora, tipoPartido, idCancha, emailCliente]
              properties:
                fecha:
                  type: string
                  format: date-time
                  example: "2026-06-08T00:00:00Z"
                hora:
                  type: string
                  example: "10:00"
                tipoPartido:
                  type: string
                  enum: [abierto, cerrado]
                  example: "cerrado"
                cuposDisponibles:
                  type: integer
                  nullable: true
                  example: 4
                idCancha:
                  type: integer
                  example: 1
                emailCliente:
                  type: string
                  format: email
                  example: "usuario@mail.com"
      responses:
        '201':
          description: Reserva creada exitosamente
          headers:
            Location:
              schema:
                type: string
              example: /reservas/1
        '400':
          description: Datos inválidos o faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: La cancha ya tiene una reserva en ese horario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: La cancha no está disponible o está en mantenimiento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reservas/{idReserva}:                                # Endpoints para consultar, modificar o eliminar una reserva específica
    get:                                                #✅ Endpoint para consultar datos de una reserva específica
      summary: Consultar una reserva
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idReserva
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Datos de la reserva obtenidos exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para ver esta reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reserva no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:                                              #✅ Endpoint para modificar el estado de una reserva (solo para admin o auxiliar)
      summary: Modificar estado de una reserva
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idReserva
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [estado]
              properties:
                estado:
                  type: string
                  enum: [pendiente, pagada, cancelada, ausente]
                  example: "cancelada"
      responses:
        '200':
          description: Estado de la reserva actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  idReserva:
                    type: integer
                    example: 1
                  estado:
                    type: string
                    enum: [pendiente, pagada, cancelada, ausente]
                    example: "cancelada"
        '400':
          description: Datos inválidos o faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para modificar esta reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reserva no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: No se puede cancelar fuera del tiempo límite permitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:                                             #✅ Endpoint para cancelar una reserva (solo para el cliente que la hizo o admin/auxiliar)
      summary: Cancelar una reserva
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idReserva
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: Reserva cancelada exitosamente
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para cancelar esta reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reserva no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: No se puede cancelar fuera del tiempo límite permitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reservas/{idReserva}/equipamiento:                   # Endpoints para listar, solicitar o quitar equipamiento solicitado en una reserva
    get:                                                #✅ Endpoint para listar el equipamiento solicitado en una reserva
      summary: Listar equipamiento solicitado en una reserva
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idReserva
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Lista de equipamiento solicitado obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    idEquipamiento:
                      type: integer
                      example: 1
                    nombre:
                      type: string
                      example: "Pelota de Fútbol Profesional N°5"
                    precio:
                      type: number
                      example: 500.00
                    cantidad:
                      type: integer
                      example: 2
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para ver el equipamiento de esta reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reserva no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:                                               #✅ Endpoint para solicitar equipamiento en una reserva
      summary: Solicitar equipamiento en una reserva
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idReserva
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idEquipamiento, cantidad]
              properties:
                idEquipamiento:
                  type: integer
                  example: 1
                cantidad:
                  type: integer
                  example: 2
      responses:
        '201':
          description: Equipamiento solicitado exitosamente
          headers:
            Location:
              schema:
                type: string
              example: /reservas/1/equipamiento
        '400':
          description: Datos inválidos o faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para solicitar equipamiento en esta reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reserva o equipamiento no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Stock insuficiente para la cantidad solicitada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /reservas/{idReserva}/equipamiento/{idEquipamiento}:  #✅ Endpoint para quitar equipamiento solicitado en una reserva 
    delete:
      summary: Quitar equipamiento de una reserva
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idReserva
          required: true
          schema:
            type: integer
          example: 1
        - in: path
          name: idEquipamiento
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: Equipamiento quitado exitosamente
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para quitar equipamiento de esta reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reserva o equipamiento no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'              

  /reservas/{idReserva}/inasistencias:                  # Endpoint para registrar la inasistencia de un cliente a una reserva (solo para admin o auxiliar)
    post:
      summary: Registrar inasistencia de un cliente en una reserva
      tags: [Reservas]
      description: >
        Registra la inasistencia. No requiere body ya que los datos de infracción se infieren y extraen directamente
        de la reserva identificada por el idReserva en el path.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idReserva
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '201':
          description: Inasistencia registrada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inasistencia'
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para registrar inasistencias
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Reserva no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Ya existe una inasistencia registrada para esta reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /clientes/{email}/inasistencias:                      # Endpoint para consultar las inasistencias de un cliente (solo para el cliente mismo, admin o auxiliar)
    get:
      summary: Consultar inasistencias de un cliente
      tags: [Reservas]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
            format: email
          example: "usuario@mail.com"
      responses:
        '200':
          description: Lista de inasistencias obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    idInasistencia:
                      type: integer
                      example: 1
                    fechaInasistencia:
                      type: string
                      format: date-time
                      example: "2026-06-08T00:00:00Z"
                    fechaCaducidad:
                      type: string
                      format: date-time
                      example: "2026-09-08T00:00:00Z"
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para ver las inasistencias de este cliente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # --------- MÓDULO: COMPLEJOS ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
                                                      
  /complejos:                                           # Endpoints para listar o crear complejos deportivos
    get:                                                #✅ Endpoint para listar complejos deportivos con paginación
      summary: Listar complejos
      tags: [Complejos]
      parameters:
        - in: query
          name: emailAdministrador
          required: false
          description: Filtrar complejos por el email del administrador
          schema:
            type: string
            format: email
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Lista de complejos obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Complejo'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:                                               #✅ Endpoint para crear un nuevo complejo
      summary: Crear un nuevo complejo
      tags: [Complejos]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, direccion, emailAdministrador]
              properties:
                nombre:
                  type: string
                  example: "Complejo Deportivo Norte"
                direccion:
                  type: string
                  example: "Av. Colón 1234"
                emailAdministrador:
                  type: string
                  format: email
                  example: "admin@complejo.com"
      responses:
        '201':
          description: Complejo creado exitosamente
          headers:
            Location:
              schema:
                type: string
              example: /complejos/1
        '400':
          description: Datos inválidos o faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para crear un complejo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /complejos/{idComplejo}:                              # Endpoints para consultar, modificar o eliminar un complejo específico
    get:                                                #✅ Endpoint para consultar datos de un complejo específico
      summary: Consultar datos de un complejo
      tags: [Complejos]
      parameters:
        - in: path
          name: idComplejo
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Datos del complejo obtenidos exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Complejo'
        '404':
          description: Complejo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:                                              #✅ Endpoint para modificar datos de un complejo específico
      summary: Modificar datos de un complejo
      tags: [Complejos]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idComplejo
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                  example: "Complejo Deportivo Sur"
                direccion:
                  type: string
                  example: "Av. Alem 5678"
      responses:
        '200':
          description: Complejo actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Complejo'
        '400':
          description: Datos inválidos o faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para modificar este complejo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Complejo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:                                             #✅ Endpoint para eliminar un complejo específico
      summary: Eliminar un complejo
      tags: [Complejos]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idComplejo
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '204':
          description: Complejo eliminado exitosamente
        '401':
          description: Token no enviado o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: No tenés permisos para eliminar este complejo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Complejo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              
  /complejos/{idComplejo}/equipamiento:                 # Endpoints para listar, agregar o eliminar equipamiento de un complejo
    get:                                                #✅ Endpoint para listar el equipamiento de un complejo
      summary: Listar equipamiento de un complejo
      tags: [Complejos]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idComplejo
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Lista de equipamiento obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    idEquipamiento:
                      type: integer
