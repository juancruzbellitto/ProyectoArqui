  # --------- MÓDULO: ESTADISTICAS ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------

  /estadisticas/{idComplejo}/dashboard:               # Endpoint para obtener un resumen general del complejo
    get:
      summary: Obtener el resumen general del complejo
      tags: [Estadísticas]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idComplejo
          required: true
          description: ID del complejo deportivo
          schema:
            type: string
            example: "comp_34"
        - in: query
          name: idCancha
          required: false
          description: ID de la cancha específica para filtrar los datos. Si se omite, se muestran los datos de todo el complejo.
          schema:
            type: string
            example: "cancha_24"
      responses:
        '200':
          description: Resumen de métricas clave
          content:
            application/json:
              schema:
                type: object
                properties:
                  gananciasTotales:
                    type: number
                    example: 248739.74
                  reservasTotales:
                    type: integer
                    example: 84
                  porcentajeDeOcupacion:
                    type: number
                    description: Porcentaje de ocupacion sobre el total de turnos disponibles
                    example: 81.4
        '403':
          description: No sos administrador de este complejo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Complejo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /estadisticas/{idComplejo}/ocupaciones:             # Endpoint para obtener la serie de datos de ocupación diaria por rango de fechas
    get:
      summary: Consultar datos de ocupacion por rango de fechas
      tags: [Estadísticas]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idComplejo
          required: true
          schema:
            type: string
            example: "comp_34"
        - in: query
          name: fechaInicio
          required: true
          description: Fecha de inicio (YYYY-MM-DD)
          schema:
            type: string
            format: date-time
            example: "2026-03-23T00:00:00Z"
        - in: query
          name: fechaFin
          required: true
          description: Fecha de fin (YYYY-MM-DD)
          schema:
            type: string
            format: date-time
            example: "2026-03-26T00:00:00Z"
        - in: query
          name: idCancha
          required: false
          description: ID de la cancha específica para filtrar los datos. Si se omite, se muestran los datos de todo el complejo.
          schema:
            type: string
            example: "cancha_24"
      responses:
        '200':
          description: Serie de datos de ocupación diaria
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: string
                      format: date-time
                      example: "2026-03-27T00:00:00Z"
                    turnosTotales:
                      type: integer
                      example: 35
                    turnosOcupados:
                      type: integer
                      example: 22
                    porcentajeDeOcupacion:
                      type: number
                      example: 62.86

  /estadisticas/{idComplejo}/ganancias:               # Endpoint para obtener la serie de datos de ganancias diarias por rango de fechas
    get:
      summary: Consultar reporte de ingresos
      tags: [Estadísticas]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idComplejo
          required: true
          schema:
            type: string
            example: "comp_34"
        - in: query
          name: fechaInicio
          required: true
          schema:
            type: string
            format: date-time
            example: "2026-03-23T00:00:00Z"
        - in: query
          name: fechaFin
          required: true
          schema:
            type: string
            format: date-time
            example: "2026-03-26T00:00:00Z"
        - in: query
          name: idCancha
          required: false
          description: ID de la cancha específica para filtrar los datos. Si se omite, se muestran los datos de todo el complejo.
          schema:
            type: string
            example: "cancha_24"
      responses:
        '200':
          description: Ingresos detallados por fecha
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: string
                      format: date-time
                      example: "2026-03-24T00:00:00Z"
                    ganancias:
                      type: number
                      example: 88400.00

  # --------- MÓDULO: PAGOS ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

  /pagos/checkout:                                    # Endpoint para realizar los pagos
    post:
      summary: Registrar un nuevo pago
      tags: [Pagos]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ idReserva, monto, pagador ]
              properties:
                idReserva:
                  type: string
                  example: "res_227"
                monto:
                  type: number
                  example: 25420.30
                pagador:
                  type: object
                  properties:
                    nombre:
                      type: string
                      example: "Juan Perez"
                    email:
                      type: string
                      example: "juanperez@email.com"
      responses:
        '201':
          description: Pago realizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkoutURL:
                    type: string
                    example: "https://www.mercadopago.com.ar/checkout/v1/redirect?pref_id=123456"
                  idPago:
                    type: string
                    example: "pago_289"
        '404':
          description: Reserva no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Datos inválidos o faltantes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /pagos/{idPago}:                                    # Endpoint para consultar pagos
    get:
      summary: Consultar pagos del usuario
      tags: [Pagos]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idPago
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Descripción del pago
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pago'
        '404':
          description: Pago no encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: No puedes acceder al pago de otro usuario
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /pagos/webhook:                                     #Endpoint para recibir la notificacion del servicio de pagos utilizado (MP)
    post:
      summary: Notificación de pagos
      tags: [Pagos]
      description: >
        Webhook para recibir notificaciones asincrónicas de Mercado Pago.
        La autenticación se realiza verificando la firma digital en el header 'x-signature'
        utilizando la clave secreta compartida
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ event, data ]
              properties:
                event:
                  type: string
                  example: "SUCCESS"
                data:
                  type: object
                  properties:
                    idPago:
                      type: string
                      example: "pago_325"
                    externalReference:
                      type: string
                      example: "tx_bfg_340"
      responses:
        '200':
          description: OK

  /pagos/{idPago}/reembolsos:                         #Endpoint para solicitar reembolsos
    post:
      summary: Solicitar reembolso de un pago
      tags: [Pagos]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: idPago
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ motivo, monto ]
              properties:
                motivo:
                  type: string
                  example: "Cancha cancelada por mal clima"
                monto:
                  type: number
                  example: 26309.87
      responses:
        '201':
          description: Solicitud de reembolso
          content:
            application/json:
              schema:
                type: object
                properties:
                  idReembolso:
                    type: string
                    example: "ref_609"
                  status:
                    type: string
                    example: "PENDING"
        '404':
          description: Pago no encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: No tienes permisos para esta accion
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # --------- COMPONENTES REUTILIZABLES ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------

components:

  securitySchemes:
    bearerAuth:                           # Referenciado con 'security: - bearerAuth: []' en cada endpoint protegido
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Error:                                # Esquema reutilizable para todos los errores del sistema
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: RECURSO_NO_ENCONTRADO   # SNAKE_UPPER_CASE — identifica el error de negocio
            message:
              type: string
              example: El recurso solicitado no existe
            details:
              type: string
              description: Información adicional opcional

    Pagination:                           # Esquema reutilizable para respuestas paginadas (usado en GET /complejos)
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 5

    Usuario:                              # Esquema reutilizable para la entidad Usuario (tabla Usuario del diccionario)
      type: object
      properties:
        email:
          type: string
